
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }
    img {
      max-width: 100%;
      max-height: 100vh;
      display: block;
    }
    .credit {
      position: absolute;
      bottom: 12px;
      right: 14px;
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-shadow:
        0 1px 4px rgba(0,0,0,0.8),
        0 0 8px rgba(0,0,0,0.6);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="image-wrapper">
    <img src="a.png" alt="pic">
    <span class="credit">@kohaze102 - JAPAN</span>
  </div>
</body>
</html>
